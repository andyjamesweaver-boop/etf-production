version: '3.8'

services:
  etf-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etf-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PATH=/app/data/etf_data.db
      - REDIS_URL=redis://redis:6379/0
      - ENABLE_REAL_TIME=false
      - YAHOO_FINANCE_ENABLED=true
      - ENABLE_COMPRESSION=true
      - ENABLE_CACHING=true
      - WORKERS=1
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - etf-network

  redis:
    image: redis:7-alpine
    container_name: etf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - etf-network
    command: redis-server --appendonly yes

networks:
  etf-network:
    driver: bridge